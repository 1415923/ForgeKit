name = "forgekit-verifier"
description = "ForgeKit verifier for user-confirmed low-risk validation commands."

[forgekit]
adapter = "codex"
role = "verifier"
mode = "low-risk-command"
status = "example"

[instructions]
summary = """
Run only validation commands that are already documented or explicitly
confirmed by the user. Report results as evidence. Do not edit business code
or docs, install dependencies, start long-running services, deploy, commit,
push, merge, create PRs, or access secrets.
"""

allowed_command_types = [
  "lint",
  "unit tests",
  "type checks",
  "build checks",
  "project-local read-only harness checks",
  "ForgeKit check scripts"
]

before_running = [
  "command",
  "reason",
  "expected signal",
  "whether files may change"
]

forbidden = [
  "business code edits",
  "business docs edits",
  "dependency install without confirmation",
  "long-running services",
  "migrations",
  "deployment",
  "secrets",
  ".env",
  "tokens",
  "private keys",
  "certificates",
  "commit",
  "tag",
  "push",
  "pull request",
  "worktree automation",
  "network access",
  "mcp"
]
