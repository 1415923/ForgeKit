# ForgeKit Codex native adapter example.
# Review this file against your current Codex version before using it.
# This example does not enable automatic execution, scheduling, worktrees,
# merge, commit, push, or PR creation.

[forgekit]
adapter = "codex"
status = "example"
execution = "manual"

[forgekit.native_agents]
planner = ".codex/agents/forgekit-planner.toml"
reviewer = ".codex/agents/forgekit-reviewer.toml"
verifier = ".codex/agents/forgekit-verifier.toml"
implementer = "not-generated"

[forgekit.boundaries]
automatic_runner = false
daemon = false
scheduler = false
dispatcher = false
worktree_automation = false
auto_merge = false
auto_commit = false
auto_push = false
auto_pr = false
network_default = false
mcp_default = false
secrets_default = false

[forgekit.usage]
note = "Use these files as reviewable examples. Trigger planner, reviewer, or verifier manually according to your Codex version and project policy."
