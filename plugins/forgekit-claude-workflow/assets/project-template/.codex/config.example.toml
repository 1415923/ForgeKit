# Codex 项目配置示例
#
# 这是示例文件，不应直接覆盖用户的 ~/.codex/config.toml。
# 需要启用 MCP 或多 agent 时，先读取 governance/team-agent-rollout.md，
# 再复制必要片段并按项目确认权限、账号、凭据和网络影响。

sandbox_mode = "workspace-write"

[features]
# 高级项目需要多 agent 角色时再启用。
multi_agent = false

# MCP 服务器示例：
# - Context7：官方文档检索
# - Playwright：浏览器自动化和 E2E 验证
# - GitHub：仓库、issue、PR 上下文
# - Memory：跨会话记忆
# - Sequential Thinking：复杂推理拆解
#
# 启用前必须确认：
# - 是否需要网络访问
# - 是否需要凭据
# - 是否会读取或修改外部资源
# - 是否有项目级替代方案
# - 是否可以先用 command、hook 或 plugin 解决

# [mcp_servers.context7]
# command = "npx"
# args = ["-y", "@upstash/context7-mcp"]

# [mcp_servers.playwright]
# command = "npx"
# args = ["-y", "@playwright/mcp"]

# [mcp_servers.github]
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# [mcp_servers.github.env]
# GITHUB_PERSONAL_ACCESS_TOKEN = "使用环境变量或本机安全配置，不要写入仓库"
